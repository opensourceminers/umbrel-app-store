version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: opensourceminers-lightningmate_web_1
      APP_PORT: 3001

  web:
    image: ghcr.io/opensourceminers/lightningmate:v0.6.10@sha256:199a9df7855714d3b2fe2bc011ebdda88bd58fee2653f283111b35094ca61c1a
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    volumes:
      # Read-only access to LND's tls.cert + macaroons (incl. admin if writes on).
      - ${APP_LIGHTNING_NODE_DATA_DIR}:/lnd:ro
      # App's own writable data dir (autopilot config + rebalance accounting).
      - ${APP_DATA_DIR}/data:/data
    environment:
      # Pass LND connection details from the lightning app into the container.
      APP_LIGHTNING_NODE_IP: "$APP_LIGHTNING_NODE_IP"
      APP_LIGHTNING_NODE_GRPC_PORT: "$APP_LIGHTNING_NODE_GRPC_PORT"
      LND_SOCKET: "$APP_LIGHTNING_NODE_IP:$APP_LIGHTNING_NODE_GRPC_PORT"
      # Explicit cert/macaroon paths in the mounted, read-only LND data dir.
      LND_DIR: "/lnd"
      LND_CERT_PATH: "/lnd/tls.cert"
      LND_MACAROON_PATH: "/lnd/data/chain/bitcoin/$APP_BITCOIN_NETWORK/readonly.macaroon"
      DATA_DIR: "/data"
      PORT: "3001"
      # Bind to all interfaces so Umbrel's app_proxy can reach the container.
      # (Standalone defaults to 127.0.0.1 for safety.) app_proxy provides auth.
      LM_BIND: "0.0.0.0"
      # Per-install secrets for server-side auth (other app containers share the
      # Docker network). $APP_PASSWORD = the per-app password Umbrel shows the
      # user (deterministicPassword); $APP_SEED signs session tokens.
      APP_PASSWORD: "$APP_PASSWORD"
      APP_SEED: "$APP_SEED"
      # Enable fee/rebalance/open-channel writes + autopilot (admin macaroon,
      # auto-mounted read-only from the lightning app's data dir).
      LM_ENABLE_WRITE: "true"
      LND_WRITE_MACAROON_PATH: "/lnd/data/chain/bitcoin/$APP_BITCOIN_NETWORK/admin.macaroon"
      # Service fee on completed Magma liquidity sales: 0.5% (50 bps) of the earned
      # lease fee, paid to the address below. Shown in the Sell tab. Set to "0" to
      # disable. Best-effort + skipped on the seller's own node.
      LM_SELL_FEE_BPS: "50"
      LM_SELL_FEE_ADDRESS: "lightningmate@btcpay.opensourceminers.de"
