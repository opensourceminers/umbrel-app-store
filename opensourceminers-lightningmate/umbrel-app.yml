id: opensourceminers-lightningmate
category: finance
name: Lightning Mate
version: "0.6.7"
tagline: Profit-aware management & autopilot for your Lightning node
description: >-
  LightningMate manages your Lightning node so you don't have to babysit it.
  It connects automatically to your Umbrel Lightning (LND) node.


  See channels with live balance bars and source / sink / router roles, a full
  Forwards routing report, and a Profit & Loss overview (routing revenue vs
  channel-open and rebalancing costs). Get scored channel-peer suggestions from
  the network graph and open channels in a click.


  Flip on the Autopilot and the node tunes its own fees and runs only profitable
  rebalances on recommended settings — with safe caps and per-channel cooldowns.


  Buy and sell channel liquidity on the Amboss Magma marketplace right from the
  app: purchase inbound, list your own sell offer, and let the Autopilot fulfil
  orders automatically — opening channels to buyers within your capital caps.


  Lightning Mate signs in with the per-app password Umbrel generates for it
  (shown when you open the app), so no other app on your server can read your
  node or move your funds.
releaseNotes: >-
  A polished dashboard. The outbound / inbound bar is now a two-sided liquidity
  meter with a balance indicator; Node health is regrouped into six categories —
  including peer diversity and on-chain reserve — shown as a score ring with
  colour-coded bars; and Profit & Loss has a clearer net-profit hero with a
  segmented cost breakdown (opens / rebalancing / closes). The Autopilot history
  is now expandable and shows exactly why an action failed.
